<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberDict — Cybersecurity Dictionary</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --accent2:  #3fb950;
      --danger:   #f85149;
      --warn:     #d29922;
      --text:     #c9d1d9;
      --muted:    #8b949e;
      --radius:   8px;
      --font:     'Segoe UI', system-ui, -apple-system, sans-serif;
      --mono:     'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: inherit;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      fill: var(--accent);
    }

    .logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .logo-sub {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Search bar ── */
    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    #search {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      padding: 0.55rem 1rem 0.55rem 2.5rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      fill: var(--muted);
      pointer-events: none;
    }

    /* ── Category filter pills ── */
    #filter-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .pill {
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.25rem 0.85rem;
      font-size: 0.8rem;
      color: var(--muted);
      background: transparent;
      transition: all 0.15s;
      user-select: none;
    }

    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Main layout ── */
    main {
      flex: 1;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    #count {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Term cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.85rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: var(--accent); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1.1rem;
      cursor: pointer;
      user-select: none;
    }

    .card-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      flex: 1;
    }

    .badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.55rem;
      border-radius: 2rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .badge-attack   { background: #3d1a1a; color: var(--danger); border: 1px solid #5c2020; }
    .badge-defense  { background: #1a2e1a; color: var(--accent2); border: 1px solid #1f4a1f; }
    .badge-concept  { background: #1a2540; color: var(--accent); border: 1px solid #1e3a5f; }
    .badge-tool     { background: #2b2416; color: var(--warn); border: 1px solid #4a3a10; }
    .badge-protocol { background: #261a38; color: #bc8cff; border: 1px solid #3d2460; }
    .badge-standard { background: #1a2d2d; color: #39d0d0; border: 1px solid #1a4545; }

    .chevron {
      fill: var(--muted);
      width: 16px;
      height: 16px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .card.open .chevron { transform: rotate(180deg); }

    .card-body {
      display: none;
      padding: 0 1.1rem 1.1rem;
      border-top: 1px solid var(--border);
    }

    .card.open .card-body { display: block; }

    .card-body p {
      font-size: 0.92rem;
      line-height: 1.65;
      color: var(--text);
      margin-top: 0.75rem;
    }

    .card-body .also {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .card-body .also span { color: var(--accent2); }

    code {
      font-family: var(--mono);
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1em 0.4em;
      font-size: 0.88em;
      color: var(--warn);
    }

    /* ── Empty state ── */
    #empty {
      display: none;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }

    #empty svg { width: 64px; height: 64px; fill: var(--border); margin-bottom: 1rem; }
    #empty h3 { font-size: 1.1rem; margin-bottom: 0.4rem; color: var(--text); }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Highlight matched text ── */
    mark {
      background: rgba(88, 166, 255, 0.25);
      color: #fff;
      border-radius: 2px;
    }
  </style>
</head>

<script>

const TERMS = [

    body: `SQL Injection occurs when an attacker is able to insert or "inject" a malicious SQL query via user input. A successful attack can read sensitive data, modify data, execute admin operations, or even issue commands to the operating system.<br><br>
<strong>Example:</strong> <code>' OR '1'='1</code> entered in a login field can bypass authentication.<br><br>
<strong>Prevention:</strong> Use parameterized queries / prepared statements, input validation, and least-privilege DB accounts.`,
    also: ["Blind SQLi", "Union-based SQLi", "Error-based SQLi"]

    body: `XSS attacks enable attackers to inject malicious scripts into content that other users see. The browser has no way to distinguish the script from legitimate content and executes it, potentially stealing cookies, tokens, or performing actions on behalf of the victim.<br><br>

<strong>Prevention:</strong> Output encoding, Content Security Policy (CSP), HttpOnly and Secure cookie flags.`,
    also: ["CSRF", "Clickjacking", "Content Security Policy"]

<strong>Defence:</strong> Security awareness training, multi-factor authentication, email filtering (SPF/DKIM/DMARC).`,
    also: ["Spear-phishing", "Social Engineering", "MFA"]

  {

    short: "Secretly intercepting and possibly altering communication between two parties.",
    body: `In a MitM attack the adversary positions themselves between client and server, able to eavesdrop, modify, or inject traffic without either party being aware.<br><br>
<strong>Common techniques:</strong> ARP spoofing, DNS spoofing, SSL stripping, rogue Wi-Fi hotspots.<br><br>
<strong>Prevention:</strong> TLS/HTTPS with certificate pinning, HSTS, VPNs, mutual TLS.`,
    also: ["ARP Spoofing", "SSL Stripping", "HSTS"]

  {

<strong>Notable examples:</strong> WannaCry, NotPetya, REvil, LockBit.<br><br>
<strong>Prevention:</strong> Offline backups, patch management, endpoint detection, network segmentation, least-privilege.`,
    also: ["Malware", "Double Extortion", "Backup & Recovery"]

    body: `A DoS attack makes a resource unavailable by overwhelming it. A Distributed DoS (DDoS) uses many machines (often a botnet) to amplify the attack.<br><br>

<strong>Defence:</strong> Rate limiting, CDN/scrubbing services (e.g. Cloudflare), anycast routing, WAFs.`,

    also: ["XSS", "SameSite Cookie", "CORS"]
  },

    term: "Multi-Factor Authentication (MFA)",
    cat: "defense",
    short: "Requiring more than one verification factor to grant access.",
    body: `MFA combines two or more independent credentials: something you <em>know</em> (password), something you <em>have</em> (TOTP app, hardware key), and something you <em>are</em> (fingerprint).<br><br>

    body: `PoLP limits blast radius: if an account or process is compromised, the damage is bounded by its limited permissions.<br><br>

// ── Rendering ──────────────────────────────────────────────────────────────

function badgeClass(cat) {
  return `badge badge-${cat}`;
}

function badgeLabel(cat) {
  return cat.charAt(0).toUpperCase() + cat.slice(1);
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function buildCards(list, q) {
  const container = document.getElementById('entries');
  const empty = document.getElementById('empty');
  const count = document.getElementById('count');

  if (list.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    count.textContent = '';
    return;
  }

  empty.style.display = 'none';
  count.textContent = `${list.length} term${list.length !== 1 ? 's' : ''} found`;

  container.innerHTML = list.map((t, i) => {
    const termHL = highlight(escapeHtml(t.term), q);
    const shortHL = highlight(escapeHtml(t.short), q);
    const also = t.also && t.also.length
      ? `<p class="also">See also: ${t.also.map(a => `<span>${escapeHtml(a)}</span>`).join(' · ')}</p>`
      : '';
    return `
      <div class="card" id="card-${i}" role="article">
        <div class="card-header" role="button" tabindex="0" aria-expanded="false" aria-controls="body-${i}" onclick="toggle(${i})" onkeydown="if(event.key==='Enter'||event.key===' ')toggle(${i})">
          <h2>${termHL}</h2>
          <span class="${badgeClass(t.cat)}">${badgeLabel(t.cat)}</span>
          <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
        <div class="card-body" id="body-${i}" role="region" aria-label="${escapeHtml(t.term)} details">
          <p>${shortHL}</p>
          <p>${t.body}</p>
          ${also}
        </div>
      </div>`;
  }).join('');
}

function toggle(i) {
  const card = document.getElementById(`card-${i}`);
  const header = card.querySelector('.card-header');
  const isOpen = card.classList.toggle('open');
  header.setAttribute('aria-expanded', isOpen);
}

// ── Filtering logic ────────────────────────────────────────────────────────

let currentCat = 'all';
let currentQ   = '';

function applyFilter() {
  const q = currentQ.toLowerCase().trim();
  const filtered = TERMS.filter(t => {
    const catMatch = currentCat === 'all' || t.cat === currentCat;
    const searchMatch = !q ||
      t.term.toLowerCase().includes(q) ||
      t.short.toLowerCase().includes(q) ||
      t.body.toLowerCase().includes(q) ||
      (t.also && t.also.some(a => a.toLowerCase().includes(q)));
    return catMatch && searchMatch;
  });
  buildCards(filtered, q);
}

// ── Event listeners ────────────────────────────────────────────────────────

document.getElementById('search').addEventListener('input', e => {
  currentQ = e.target.value;
  applyFilter();
});

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentCat = pill.dataset.cat;
    applyFilter();
  });
});

// ── Initial render ─────────────────────────────────────────────────────────
applyFilter();
</script>
